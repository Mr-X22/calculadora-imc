<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IMC OMS</title>

<style>
/* 
Mejoras generales realizadas:
- Se amplió el ancho del recuadro para dar más espacio.
- Se aumentó la altura de la barra de colores para mayor visibilidad.
- Se ajustaron las etiquetas con tipografía más pequeña y flexbox, 
  de modo que cada nombre quede exactamente debajo de su color.
- Los cambios realizados se hicieron apartir de una prueba que se hizo
  a un usuario, con el fin de ver su dificultad de uso en un momento
  real y no imaginario.
*/

body {
    font-family: Arial, sans-serif;
    background: #2f5d5b;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #eaeaea;
    padding: 25px;
    border-radius: 10px;
    width: 500px; /* Zona modificada: recuadro más ancho */
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

h2 {
    text-align: center;
}

.input-group {
    margin-bottom: 15px;
}

label {
    font-weight: bold;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #2f5d5b;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #244746;
}

#resultado {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
}

#estado {
    text-align: center;
    font-size: 16px;
    margin-top: 5px;
    font-weight: bold;
}

/* GAUGE */
.gauge {
    margin-top: 20px;
    width: 100%;
}

.bar {
    position: relative;
    height: 30px; /* Zona modificada: barra más alta */
    border-radius: 12px;
    overflow: hidden;
    display: flex;
}

.segment {
    width: 16.66%;
    height: 100%;
}

/* Colores de cada categoría */
.bajo { background: #3498db; }
.normal { background: #2ecc71; }
.pre { background: #f1c40f; }
.ob1 { background: #e67e22; }
.ob2 { background: #e74c3c; }
.ob3 { background: #8e44ad; }

.indicator {
    position: absolute;
    top: -5px;
    width: 4px;
    height: 40px; /* Zona modificada: indicador más largo */
    background: black;
    left: 0%;
    transition: 0.5s;
}

/* Zona modificada: etiquetas alineadas debajo de cada color */
.labels {
    display: flex;
    margin-top: 10px;
    font-size: 11px; /* Texto más pequeño */
    font-weight: bold;
}

.labels span {
    flex: 1; /* Cada etiqueta ocupa el mismo ancho que su segmento */
    text-align: center;
    line-height: 1.2;
}
</style>

</head>
<body>

<div class="container">
    <h2>Calculadora IMC (OMS)</h2>

    <div class="input-group">
        <label>Nombre</label>
        <input type="text" id="nombre" placeholder="Ej: Juan">
    </div>

    <div class="input-group">
        <label>Peso (kg)</label>
        <input type="text" id="peso" placeholder="Ej: 70">
    </div>

    <div class="input-group">
        <label>Estatura (m)</label>
        <input type="text" id="estatura" placeholder="Ej: 1.75">
    </div>

    <button onclick="calcularIMC()">Calcular</button>

    <p id="resultado"></p>
    <p id="estado"></p>

    <div class="gauge">
        <div class="bar">
            <div class="segment bajo"></div>
            <div class="segment normal"></div>
            <div class="segment pre"></div>
            <div class="segment ob1"></div>
            <div class="segment ob2"></div>
            <div class="segment ob3"></div>

            <div class="indicator" id="indicador"></div>
        </div>

        <!-- Etiquetas alineadas debajo de cada color -->
        <div class="labels">
            <span>Bajo peso</span>
            <span>Peso normal</span>
            <span>Pre‑obesidad</span>
            <span>Obesidad I</span>
            <span>Obesidad II</span>
            <span>Obesidad III</span>
        </div>
    </div>
</div>

<script>
function calcularIMC() {
    let nombre = document.getElementById("nombre").value.trim();
    let peso = document.getElementById("peso").value;
    let estatura = document.getElementById("estatura").value;

    if (nombre === "") {
        document.getElementById("resultado").innerText = "Ingresa tu nombre";
        document.getElementById("estado").innerText = "";
        return;
    }

    peso = parseFloat(peso);
    estatura = parseFloat(estatura);

    if (isNaN(peso) || isNaN(estatura) || peso <= 0 || estatura <= 0) {
        document.getElementById("resultado").innerText = "Datos inválidos";
        document.getElementById("estado").innerText = "";
        return;
    }

    let imc = peso / (estatura * estatura);

    let estadoTexto = "";
    let color = "";
    let posicion = 0;

    if (imc < 18.5) {
        estadoTexto = "Bajo peso";
        color = "#3498db";
        posicion = 16.66 * 0.5;
    } else if (imc < 25) {
        estadoTexto = "Peso normal";
        color = "#2ecc71";
        posicion = 16.66 * 1.5;
    } else if (imc < 30) {
        estadoTexto = "Pre‑obesidad";
        color = "#f1c40f";
        posicion = 16.66 * 2.5;
    } else if (imc < 35) {
        estadoTexto = "Obesidad I";
        color = "#e67e22";
        posicion = 16.66 * 3.5;
    } else if (imc < 40) {
        estadoTexto = "Obesidad II";
        color = "#e74c3c";
        posicion = 16.66 * 4.5;
    } else {
        estadoTexto = "Obesidad III";
        color = "#8e44ad";
        posicion = 16.66 * 5.5;
    }

    document.getElementById("resultado").innerText =
        nombre + ", tu IMC es: " + imc.toFixed(2);

    let estado = document.getElementById("estado");
    estado.innerText = nombre + ", estás en: " + estadoTexto;
    estado.style.color = color;

    document.getElementById("indicador").style.left = posicion + "%";
}
</script>

</body>
</html>

</body>
</html>
